<!doctype html>
<html lang="en" class="splash-active">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>SanPOS</title>
    <style>
      html.splash-active,
      html.splash-active body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      #splash-screen {
        --splash-brand: #2563eb;
        --splash-brand-dim: #1d4ed8;
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Ubuntu,
          sans-serif;
        background:
          radial-gradient(ellipse 120% 90% at 50% -15%, #1e3a8a 0%, transparent 55%),
          linear-gradient(180deg, #0f172a 0%, #070b12 100%);
        color: #f8fafc;
        transition:
          opacity 0.38s ease,
          transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
      }
      #splash-screen.splash--exiting {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }
      .splash-mark {
        display: flex;
        height: 4.5rem;
        width: 4.5rem;
        align-items: center;
        justify-content: center;
        border-radius: 1.25rem;
        font-size: 1.75rem;
        font-weight: 900;
        letter-spacing: -0.06em;
        color: #fff;
        background: linear-gradient(145deg, #3b82f6, var(--splash-brand-dim));
        box-shadow:
          0 0 0 1px rgb(255 255 255 / 0.12),
          0 20px 50px -12px rgb(37 99 235 / 0.45);
      }
      .splash-title {
        margin: 1.5rem 0 0;
        font-size: clamp(1.75rem, 5vw, 2.25rem);
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .splash-tag {
        margin: 0.5rem 0 0;
        max-width: 16rem;
        text-align: center;
        font-size: 0.8125rem;
        line-height: 1.45;
        color: rgb(148 163 184 / 0.95);
      }
      .splash-loader {
        margin-top: 2.25rem;
        height: 3px;
        width: min(10rem, 42vw);
        border-radius: 999px;
        background: rgb(255 255 255 / 0.1);
        overflow: hidden;
      }
      .splash-loader::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, #60a5fa, transparent);
        animation: splash-shimmer 1.1s ease-in-out infinite;
      }
      @keyframes splash-shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen" role="status" aria-live="polite" aria-label="Loading SanPOS">
      <div class="splash-mark" aria-hidden="true">S</div>
      <h1 class="splash-title">SanPOS</h1>
      <p class="splash-tag">Point of sale — starting up</p>
      <div class="splash-loader" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
